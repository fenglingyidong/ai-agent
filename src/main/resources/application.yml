server:
  port: ${SERVER_PORT:18082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

spring:
  application:
    name: rag-agent
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3307/rag_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}
      encoding: UTF-8
  mvc:
    async:
      request-timeout: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:180s}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 8000ms
      connect-timeout: 8000ms
    jedis:
      pool:
        max-active: 8
        max-wait: 5000ms
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        completions-path: /chat/completions
        options:
          model: qwen3.5-omni-plus-2026-03-15
      embedding:
        embeddings-path: /embeddings
        options:
          model: text-embedding-v3
    mcp:
      client:
        enabled: true
        type: SYNC
        name: rag-agent-mcp-client
        version: 1.0.0
        initialized: false
        request-timeout: 30s
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            websearch:
              url: https://dashscope.aliyuncs.com
              endpoint: /api/v1/mcps/WebSearch/mcp

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

app:
  observability:
    langfuse:
      enabled: ${LANGFUSE_ENABLED:false}
      base-url: ${LANGFUSE_BASE_URL:http://localhost:3001}
      capture-prompt: ${LANGFUSE_CAPTURE_PROMPT:false}
  conversation-log:
    enabled: ${CONVERSATION_LOG_ENABLED:true}
    max-turns-per-session: ${CONVERSATION_LOG_MAX_TURNS_PER_SESSION:1000}
  vector:
    milvus:
      host: ${MILVUS_HOST:localhost}
      port: ${MILVUS_PORT:19530}
      uri: ${MILVUS_URI:}
      token: ${MILVUS_TOKEN:}
      username: ${MILVUS_USERNAME:}
      password: ${MILVUS_PASSWORD:}
      database-name: ${MILVUS_DATABASE:default}
      secure: ${MILVUS_SECURE:false}
      initialize-schema: ${MILVUS_INITIALIZE_SCHEMA:true}
      embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1024}
      metric-type: ${MILVUS_METRIC_TYPE:COSINE}
      index-type: ${MILVUS_INDEX_TYPE:IVF_FLAT}
      index-parameters: '${MILVUS_INDEX_PARAMETERS:{"nlist":1024}}'
    product:
      collection-name: ${PRODUCT_VECTOR_COLLECTION:product_index}
      bm25-enabled: ${PRODUCT_BM25_ENABLED:true}
    memory:
      collection-name: ${MEMORY_VECTOR_COLLECTION:memory_index}
  rag:
    retrieval:
      dense-child-top-k: ${RAG_DENSE_CHILD_TOP_K:24}
      dense-similarity-threshold: ${RAG_DENSE_SIMILARITY_THRESHOLD:0.2}
      dense-fallback-top-k: ${RAG_DENSE_FALLBACK_TOP_K:32}
      bm25-child-top-k: ${RAG_BM25_CHILD_TOP_K:8}
      bm25-rpc-deadline-ms: ${RAG_BM25_RPC_DEADLINE_MS:2000}
      bm25-future-timeout-ms: ${RAG_BM25_FUTURE_TIMEOUT_MS:2500}
      parallel-executor-core-size: ${RAG_RETRIEVAL_EXECUTOR_CORE_SIZE:4}
      parallel-executor-max-size: ${RAG_RETRIEVAL_EXECUTOR_MAX_SIZE:8}
      parallel-executor-queue-capacity: ${RAG_RETRIEVAL_EXECUTOR_QUEUE_CAPACITY:32}
      rrf-k: ${RAG_RRF_K:60}
      min-child-results-to-keep: ${RAG_MIN_CHILD_RESULTS_TO_KEEP:4}
      max-child-results-to-consider: ${RAG_MAX_CHILD_RESULTS_TO_CONSIDER:12}
      max-parent-results: ${RAG_MAX_PARENT_RESULTS:6}
      min-normalized-gap-to-truncate: ${RAG_MIN_NORMALIZED_GAP_TO_TRUNCATE:0.0}
  memory:
    max-recent-messages: 12
    max-recent-age: 3650d
    short-term-ttl: ${MEMORY_SHORT_TERM_TTL:30d}
    idle-summary-age: ${MEMORY_IDLE_SUMMARY_AGE:1d}
    idle-summary-scan-interval: ${MEMORY_IDLE_SUMMARY_SCAN_INTERVAL:15m}
    long-term-top-k: 3
    long-term-similarity-threshold: 0.0
    summarization-concurrency: 2
    thread-queue-capacity: 100
  shopping:
    preference-ttl: ${SHOPPING_PREFERENCE_TTL:7d}
  ai:
    intent-router:
      enabled: ${INTENT_ROUTER_ENABLED:true}
      model: ${QWEN_VL_ROUTER_MODEL:qwen3-vl-8b-instruct}
      confidence-threshold: ${INTENT_ROUTER_CONFIDENCE_THRESHOLD:0.7}
    simple-task:
      enabled: ${SIMPLE_TASK_ENABLED:true}
      model: ${QWEN_SIMPLE_TASK_MODEL:${QWEN_VL_ROUTER_MODEL:qwen3-vl-8b-instruct}}
      max-tokens: ${SIMPLE_TASK_MAX_TOKENS:800}
    chat-models:
      default-model: qwen
      items:
        qwen:
          label: Qwen 3.5 Omni Plus
          model: ${QWEN_CHAT_MODEL:qwen3.5-omni-plus-2026-03-15}
        deepseek:
          label: DeepSeek V3.2
          model: deepseek-v3.2
        kimi-thinking:
          label: Kimi K2 Thinking
          model: kimi-k2-thinking
  mcp:
    websearch:
      api-key: ${DASHSCOPE_API_KEY:}
  mall:
    base-url: ${MALL_BASE_URL:http://localhost:8100}
    authorization-header: ${MALL_AUTHORIZATION_HEADER:X-Mall-Authorization}
    request-timeout: ${MALL_REQUEST_TIMEOUT:5s}
    auth-cache-ttl: ${MALL_AUTH_CACHE_TTL:2h}
    mcp:
      base-url: ${MALL_MCP_BASE_URL:http://localhost:8120}
      endpoint: /mcp
      context-path: /internal/mcp/mall/context
      context-secret: ${MCP_CONTEXT_SECRET:mall-mcp-dev-secret}
      request-timeout: 5s
