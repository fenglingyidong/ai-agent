server:
  port: ${SERVER_PORT:18082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

spring:
  application:
    name: rag-agent
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 8000ms
      connect-timeout: 8000ms
    jedis:
      pool:
        max-active: 8
        max-wait: 5000ms
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        completions-path: /chat/completions
        options:
          model: qwen3.6-plus
      embedding:
        embeddings-path: /embeddings
        options:
          model: text-embedding-v3
    vectorstore:
      redis:
        index-name: ${REDIS_VECTOR_INDEX:rag-index}
        prefix: ${REDIS_VECTOR_PREFIX:rag:}
        initialize-schema: ${REDIS_VECTOR_INITIALIZE_SCHEMA:true}
    mcp:
      client:
        enabled: true
        type: SYNC
        name: rag-agent-mcp-client
        version: 1.0.0
        initialized: false
        request-timeout: 30s
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            websearch:
              url: https://dashscope.aliyuncs.com
              endpoint: /api/v1/mcps/WebSearch/mcp

app:
  memory:
    max-recent-messages: 12
    max-recent-age: 3650d
    long-term-top-k: 3
    long-term-similarity-threshold: 0.0
    summarization-concurrency: 2
    thread-queue-capacity: 100
  ai:
    intent-router:
      enabled: ${INTENT_ROUTER_ENABLED:true}
      model: ${QWEN_VL_ROUTER_MODEL:qwen3-vl-8b-instruct}
      confidence-threshold: ${INTENT_ROUTER_CONFIDENCE_THRESHOLD:0.7}
    simple-task:
      enabled: ${SIMPLE_TASK_ENABLED:true}
      model: ${QWEN_SIMPLE_TASK_MODEL:${QWEN_VL_ROUTER_MODEL:qwen3-vl-8b-instruct}}
      max-tokens: ${SIMPLE_TASK_MAX_TOKENS:800}
    chat-models:
      default-model: qwen
      items:
        qwen:
          label: Qwen 3.6 Plus
          model: ${QWEN_CHAT_MODEL:qwen3.6-plus}
        deepseek:
          label: DeepSeek V3.2
          model: deepseek-v3.2
        kimi-thinking:
          label: Kimi K2 Thinking
          model: kimi-k2-thinking
  mcp:
    websearch:
      api-key: ${DASHSCOPE_API_KEY:}
  mall:
    base-url: ${MALL_BASE_URL:http://localhost:8100}
    authorization-header: ${MALL_AUTHORIZATION_HEADER:X-Mall-Authorization}
    mcp:
      base-url: ${MALL_MCP_BASE_URL:http://localhost:8120}
      endpoint: /mcp
      context-path: /internal/mcp/mall/context
      context-secret: ${MCP_CONTEXT_SECRET:mall-mcp-dev-secret}
      request-timeout: 5s
