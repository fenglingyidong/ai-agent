server:
  port: 8080

spring:
  application:
    name: rag-agent
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 8000ms
      connect-timeout: 8000ms
    jedis:
      pool:
        max-active: 8
        max-wait: 5000ms
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        completions-path: /chat/completions
        options:
          model: qwen-plus-2025-07-28
      embedding:
        embeddings-path: /embeddings
        options:
          model: text-embedding-v4
    vectorstore:
      redis:
        index: rag-index
        prefix: "rag:"
        initialize-schema: true
    mcp:
      client:
        enabled: true
        type: SYNC
        name: rag-agent-mcp-client
        version: 1.0.0
        initialized: false
        request-timeout: 30s
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            websearch:
              url: https://dashscope.aliyuncs.com
              endpoint: /api/v1/mcps/WebSearch/mcp

app:
  memory:
    max-recent-messages: 12
    max-recent-age: 3650d
    long-term-top-k: 3
    long-term-similarity-threshold: 0.0
    summarization-concurrency: 2
    thread-queue-capacity: 100
  ai:
    chat-models:
      default-model: qwen
      items:
        qwen:
          label: Qwen Plus
          model: qwen-plus-2025-07-28
        deepseek:
          label: DeepSeek V3.2
          model: deepseek-v3.2
        kimi-thinking:
          label: Kimi K2 Thinking
          model: kimi-k2-thinking
  mcp:
    websearch:
      api-key: ${DASHSCOPE_API_KEY:}
  security:
    demo-user:
      username: demo
      password: demo123
      role: USER
